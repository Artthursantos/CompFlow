<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Criar Conta</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #1b3a6b, #0f2a4f);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        background: #fff;
        border-radius: 1.75rem;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        padding: 2rem;
        width: 100%;
        max-width: 30rem;
      }
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 1.75rem;
      }
      .logo-box {
        width: 64px;
        height: 64px;
        background: #1b3a6b;
        border-radius: 1.125rem;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
        box-shadow: 0 8px 20px rgba(27, 58, 107, 0.25);
      }
      .logo-box svg {
        width: 36px;
        height: 36px;
        stroke: white;
      }
      .brand h1 {
        font-size: 1.875rem;
        font-weight: 700;
        color: #1b3a6b;
      }
      .brand p {
        font-size: 0.875rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }
      .form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      label {
        font-size: 0.875rem;
        font-weight: 600;
        color: #1b3a6b;
        display: block;
        margin-bottom: 0.375rem;
      }
      input,
      select {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1.5px solid #e5e7eb;
        border-radius: 0.875rem;
        font-size: 0.9375rem;
        outline: none;
        font-family: inherit;
        transition: 0.2s;
        color: #1f2937;
        background: #fff;
      }
      input:focus,
      select:focus {
        border-color: #1b3a6b;
        box-shadow: 0 0 0 3px rgba(27, 58, 107, 0.1);
      }
      input::placeholder {
        color: #c0c4c8;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 2.75rem;
      }
      .pw-toggle {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #9e9e9e;
        display: flex;
        align-items: center;
      }
      .pw-toggle:hover {
        color: #1b3a6b;
      }
      .strength {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.375rem;
      }
      .bar {
        flex: 1;
        height: 4px;
        background: #e5e7eb;
        border-radius: 4px;
        transition: 0.3s;
      }
      .bar.fraca {
        background: #ef4444;
      }
      .bar.media {
        background: #f59e0b;
      }
      .bar.forte {
        background: #10b981;
      }
      .strength-label {
        font-size: 0.7rem;
        font-weight: 600;
        color: #6b7280;
        min-width: 3.5rem;
        text-align: right;
      }
      .btn {
        width: 100%;
        background: #1b3a6b;
        color: white;
        border: none;
        border-radius: 0.875rem;
        padding: 0.875rem;
        font-size: 0.9375rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 0.25rem;
      }
      .btn:hover {
        background: #0f2c52;
      }
      .footer-text {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #9e9e9e;
      }
      .footer-text a {
        color: #2e7d32;
        font-weight: 700;
        text-decoration: none;
        margin-left: 0.25rem;
      }
      .footer-text a:hover {
        text-decoration: underline;
      }
      .select-wrap {
        position: relative;
      }
      .select-wrap::after {
        content: "▾";
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        pointer-events: none;
        color: #9e9e9e;
      }
      select {
        appearance: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="logo-box">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
            <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5" />
          </svg>
        </div>
        <h1>CompFlow</h1>
        <p>Crie sua conta e comece a planejar</p>
      </div>

      <form class="form" onsubmit="criar(event)">
        <div>
          <label>Nome completo</label>
          <input type="text" placeholder="Digite seu nome completo" required />
        </div>
        <div>
          <label>E-mail</label>
          <input
            type="email"
            placeholder="seu.email@inf.ufpel.edu.br"
            required
          />
        </div>
        <div>
          <label>Senha</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="senha"
              placeholder="Crie uma senha forte"
              oninput="verificarForca(this.value)"
              required
            />
            <button type="button" class="pw-toggle" onclick="toggle('senha')">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
          <div class="strength">
            <div class="bar" id="b1"></div>
            <div class="bar" id="b2"></div>
            <div class="bar" id="b3"></div>
            <span class="strength-label" id="forcaLabel"></span>
          </div>
        </div>
        <div>
          <label>Confirmar Senha</label>
          <div class="pw-wrap">
            <input
              type="password"
              id="confirmar"
              placeholder="Digite a senha novamente"
              required
            />
            <button
              type="button"
              class="pw-toggle"
              onclick="toggle('confirmar')"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </button>
          </div>
        </div>
        <div>
          <label>Selecione seu curso</label>
          <div class="select-wrap">
            <select required>
              <option value="">Selecione...</option>
              <option>Ciência da Computação</option>
              <option>Engenharia de Computação</option>
              <option>Sistemas de Informação</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn">Criar conta</button>
      </form>

      <p class="footer-text">Já tem conta?<a href="login.html">Entrar</a></p>
    </div>

    <script>
      function toggle(id) {
        const el = document.getElementById(id);
        el.type = el.type === "password" ? "text" : "password";
      }
      function verificarForca(v) {
        const b1 = document.getElementById("b1"),
          b2 = document.getElementById("b2"),
          b3 = document.getElementById("b3");
        const lbl = document.getElementById("forcaLabel");
        [b1, b2, b3].forEach((b) => {
          b.className = "bar";
        });
        if (!v) {
          lbl.textContent = "";
          return;
        }
        if (v.length < 6) {
          b1.classList.add("fraca");
          lbl.textContent = "Fraca";
        } else if (v.length < 10 || !/[0-9]/.test(v)) {
          b1.classList.add("media");
          b2.classList.add("media");
          lbl.textContent = "Média";
        } else {
          b1.classList.add("forte");
          b2.classList.add("forte");
          b3.classList.add("forte");
          lbl.textContent = "Forte";
        }
      }
      function criar(e) {
        e.preventDefault();
        if (
          document.getElementById("senha").value !==
          document.getElementById("confirmar").value
        ) {
          alert("As senhas não coincidem!");
          return;
        }
        window.location.href = "dashboard.html";
      }
    </script>
  </body>
</html>
