<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CompFlow - Fluxograma</title>
    <link rel="stylesheet" href="sidebar.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      .flux-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 18px;
        flex-wrap: wrap;
        gap: 12px;
      }
      .flux-header h1 {
        color: #173d7a;
        font-size: 18px;
        margin-bottom: 4px;
      }
      .flux-header p {
        color: #777;
        font-size: 13px;
      }
      .filter-btns {
        display: flex;
        gap: 8px;
      }
      .fbtn {
        border: none;
        padding: 8px 18px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 700;
        transition: 0.2s;
        background: #e8eaf0;
        color: #555;
      }
      .fbtn.active {
        background: #173d7a;
        color: white;
      }
      .fbtn:hover:not(.active) {
        background: #d0d4e0;
      }
      .flux-scroll {
        overflow-x: auto;
        padding-bottom: 12px;
      }
      .flux-scroll::-webkit-scrollbar {
        height: 6px;
      }
      .flux-scroll::-webkit-scrollbar-track {
        background: #e8eaf0;
        border-radius: 4px;
      }
      .flux-scroll::-webkit-scrollbar-thumb {
        background: #b0b8cc;
        border-radius: 4px;
      }
      .flux-grid {
        display: flex;
        gap: 14px;
        min-width: max-content;
        padding: 4px 2px;
      }
      .flux-col {
        width: 196px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .sem-header {
        background: #173d7a;
        color: white;
        text-align: center;
        font-weight: 700;
        font-size: 13px;
        padding: 10px;
        border-radius: 10px;
        letter-spacing: 0.04em;
      }
      .disc {
        border-radius: 10px;
        padding: 11px 12px;
        cursor: pointer;
        transition: 0.15s;
        user-select: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .disc:hover {
        opacity: 0.82;
        transform: scale(1.02);
      }
      .disc.aprovado {
        background: #47b84f;
        color: white;
      }
      .disc.liberado {
        background: #2f67d8;
        color: white;
      }
      .disc.bloqueado {
        background: #e53935;
        color: white;
        opacity: 0.72;
        cursor: not-allowed;
      }
      .disc-nome {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        line-height: 1.3;
      }
      .disc-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .disc-cod {
        font-size: 10px;
        opacity: 0.8;
      }
      .disc-cr {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 5px;
        padding: 1px 7px;
        font-size: 12px;
        font-weight: 700;
      }
      .legenda {
        display: flex;
        gap: 22px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .leg {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #555;
      }
      .leg-box {
        width: 14px;
        height: 14px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="logo">CompFlow</div>
        <nav class="menu">
          <a href="dashboard.html"><i class="fa-solid fa-house"></i> Início</a>
          <a href="meuprogresso.html"
            ><i class="fa-solid fa-award"></i> Meu Progresso</a
          >
          <a href="fluxograma.html" class="active"
            ><i class="fa-solid fa-arrow-trend-up"></i> Fluxograma</a
          >
          <a href="calendario.html"
            ><i class="fa-regular fa-calendar"></i> Calendário</a
          >
          <a href="contatos.html"><i class="fa-solid fa-users"></i> Contatos</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-box">
            <div class="avatar">U</div>
            <div class="user-info">
              <h4>Usuário</h4>
              <span>Ciência da Computação</span>
            </div>
            <a href="perfil.html"
              ><i
                class="fa-solid fa-gear"
                style="color: white; font-size: 14px"
              ></i
            ></a>
          </div>
          <a href="login.html" class="logout"
            ><i class="fa-solid fa-chevron-left"></i> Sair</a
          >
        </div>
      </aside>

      <main class="content">
        <div class="flux-header">
          <div>
            <h1>Fluxograma — Ciência da Computação · CDTEC · UFPEL</h1>
            <p>Clique em uma disciplina para marcar/desmarcar como concluída</p>
          </div>
          <div class="filter-btns">
            <button class="fbtn active" onclick="filtrar('todas', this)">
              Todas
            </button>
            <button class="fbtn" onclick="filtrar('disponiveis', this)">
              Disponíveis
            </button>
            <button class="fbtn" onclick="filtrar('pendentes', this)">
              Pendentes
            </button>
          </div>
        </div>

        <div class="flux-scroll">
          <div class="flux-grid" id="fluxGrid"></div>
        </div>

        <div class="legenda">
          <div class="leg">
            <div class="leg-box" style="background: #47b84f"></div>
            <span id="cntAprovado">0</span> Aprovado
          </div>
          <div class="leg">
            <div class="leg-box" style="background: #2f67d8"></div>
            <span id="cntLiberado">0</span> Liberado
          </div>
          <div class="leg">
            <div class="leg-box" style="background: #e53935"></div>
            <span id="cntBloqueado">0</span> Bloqueado
          </div>
        </div>
      </main>
    </div>

    <script>
      const semestres = [
        {
          nome: "SEM 1",
          disciplinas: [
            {
              id: 1,
              codigo: "22000294",

              cr: 4,
              status: "aprovado",
            },
            {
              id: 2,

              cr: 4,

            },
            {
              id: 3,
              codigo: "22000207",
              nome: "Laboratório de Computação",
              cr: 2,
              status: "aprovado",
            },
            {
              id: 4,
              codigo: "22000293",
              nome: "Sistemas Discretos",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 5,
              codigo: "11100085",
              nome: "Álgebra Linear",
              cr: 4,
              status: "aprovado",
            },
          ],
        },
        {
          nome: "SEM 2",
          disciplinas: [
            {
              id: 6,
              codigo: "22000295",
              nome: "Análise Combinatória e Teoria dos Grafos",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 7,
              codigo: "11100058",
              nome: "Cálculo 1",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 8,
              codigo: "22000199",
              nome: "Metodologia Científica para Computação",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 9,
              codigo: "22000296",

              cr: 4,

            },
            {
              id: 10,
              codigo: "22000200",
              nome: "Sistemas Operacionais",
              cr: 4,
              status: "aprovado",
            },
          ],
        },
        {
          nome: "SEM 3",
          disciplinas: [
            {
              id: 11,
              codigo: "22000181",
              nome: "Arquitetura e Organização de Computadores I",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 12,
              codigo: "22000197",
              nome: "Linguagens Formais",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 13,
              codigo: "11100059",
              nome: "Cálculo 2",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 14,
              codigo: "22000297",
              nome: "Algoritmos e Estruturas de Dados I",
              cr: 4,
              status: "aprovado",
            },
            {
              id: 15,
              codigo: "22000201",
              nome: "Lógica para Computação",
              cr: 4,
              status: "aprovado",
            },
          ],
        },
        {
          nome: "SEM 4",
          disciplinas: [
            {
              id: 16,
              codigo: "22000205",
              nome: "Teoria da Computação",
              cr: 4,
              status: "liberado",
            },
            {
              id: 17,
              codigo: "22000298",
              nome: "Algoritmos e Estruturas de Dados II",
              cr: 4,

            },
            {
              id: 18,

              nome: "Estatística Básica para Computação",
              cr: 4,
              status: "bloqueado",
            },
            {

              cr: 4,

            },
            {
              id: 20,
              codigo: "22000203",
              nome: "Redes de Computadores",
              cr: 4,
              status: "bloqueado",
            },
          ],
        },
        {
          nome: "SEM 5",
          disciplinas: [
            {
              id: 21,
              codigo: "22000210",
              nome: "Compiladores",
              cr: 4,
              status: "bloqueado",
            },
            {
              id: 22,
              codigo: "22000211",
              nome: "Redes de Computadores II",
              cr: 4,
              status: "bloqueado",
            },
            {
              id: 23,
              codigo: "22000212",
              nome: "Engenharia de Software I",
              cr: 4,
              status: "bloqueado",
            },
            {
              id: 24,
              codigo: "22000213",
              nome: "Inteligência Artificial",
              cr: 4,
              status: "bloqueado",
            },
            {
              id: 25,
              codigo: "22000214",
              nome: "Sistemas Distribuídos",
              cr: 4,
              status: "bloqueado",
            },
          ],
        },
      ];

      let filtroAtivo = "todas";

      function toggle(id) {
        for (const s of semestres) {
          const d = s.disciplinas.find((x) => x.id === id);
          if (d && d.status !== "bloqueado") {
            d.status = d.status === "aprovado" ? "liberado" : "aprovado";
            render();
            return;
          }
        }
      }

      function filtrar(f, btn) {
        filtroAtivo = f;
        document
          .querySelectorAll(".fbtn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      function render() {
        let ap = 0,
          li = 0,
          bl = 0;
        const grid = document.getElementById("fluxGrid");
        grid.innerHTML = "";
        semestres.forEach((s) => {
          let discs = s.disciplinas;
          if (filtroAtivo === "disponiveis")
            discs = discs.filter((d) => d.status !== "bloqueado");
          if (filtroAtivo === "pendentes")
            discs = discs.filter((d) => d.status !== "aprovado");
          const col = document.createElement("div");
          col.className = "flux-col";
          col.innerHTML = `<div class="sem-header">${s.nome}</div>`;
          discs.forEach((d) => {
            if (d.status === "aprovado") ap++;
            else if (d.status === "liberado") li++;
            else bl++;
            const el = document.createElement("div");
            el.className = `disc ${d.status}`;
            el.innerHTML = `<div class="disc-nome">${d.nome}</div><div class="disc-foot"><span class="disc-cod">${d.codigo}</span><span class="disc-cr">${d.cr}</span></div>`;
            if (d.status !== "bloqueado") el.onclick = () => toggle(d.id);
            col.appendChild(el);
          });
          grid.appendChild(col);
        });
        document.getElementById("cntAprovado").textContent = ap;
        document.getElementById("cntLiberado").textContent = li;
        document.getElementById("cntBloqueado").textContent = bl;
      }

      render();
    </script>
  </body>
</html>
