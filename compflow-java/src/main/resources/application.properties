# Banco de dados (valores locais).
# No deploy, defina as variaveis de ambiente SPRING_DATASOURCE_URL,
# SPRING_DATASOURCE_USERNAME e SPRING_DATASOURCE_PASSWORD — o Spring
# substitui estes valores automaticamente.
spring.datasource.url=jdbc:mysql://localhost:3306/compflow_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Servidor — porta dinamica no deploy (Render define PORT), 8080 no local
server.port=${PORT:8080}

# Serialização de datas ISO
spring.jackson.serialization.write-dates-as-timestamps=false
